<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CeloBank</title>
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="./assets/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="./assets/favicon/site.webmanifest" />
    <!-- Reset CSS -->
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header__container container">
        <!-- Header Top -->
        <section class="header__top">
          <div class="header__logo">
            <img src="./assets/img/logo.svg" alt="CeloBank Logo" />
          </div>
          <nav class="header__nav">
            <ul class="header__list">
              <li class="header__item">
                <a class="header__link" href="#">Home</a>
              </li>
              <li class="header__item">
                <a class="header__link" href="#">Products</a>
              </li>
              <li class="header__item">
                <a class="header__link" href="#">Features</a>
              </li>
              <li class="header__item">
                <a class="header__link" href="#">Blog</a>
              </li>
            </ul>
          </nav>
        </section>
        <!-- Header Content -->
        <section class="header__content">
          <article class="header__content-left">
            <p class="header__ds-wallet">Digital Smart Wallet</p>
          </article>
        </section>
      </div>
    </header>
  </body>
</html>
